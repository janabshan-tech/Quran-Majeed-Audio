<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕋 Quran Majeed</title>
    
    <!-- KHANA KAABA ICON -->
    <link rel="icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f54b.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f54b.svg">
    
    <!-- Premium Google Font (Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-light: #1e293b;
            --gold: #fbbf24;
            --gold-hover: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark), #1e3a8a);
            color: var(--text-main);
            text-align: center;
            padding: 30px 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Glassmorphism Premium Container */
        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            max-width: 420px;
            width: 100%;
        }

        .icon-img {
            width: 90px;
            margin-bottom: 15px;
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.4));
        }

        h1 { font-size: 26px; margin: 0 0 5px 0; font-weight: 700; color: var(--gold); }
        p { font-size: 14px; color: var(--text-muted); margin-bottom: 25px;}

        /* Premium Dropdown */
        select {
            width: 100%;
            padding: 12px 15px;
            font-size: 15px;
            background-color: var(--bg-light);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            margin-bottom: 25px;
            cursor: pointer;
            font-weight: 600;
            outline: none;
            appearance: none;
            text-align: center;
        }
        select:focus { border-color: var(--gold); }

        .saved-msg { font-size: 12px; color: #10b981; margin-bottom: 15px; display: none; font-weight: 600;}

        /* --- CUSTOM PREMIUM PLAYER --- */
        .progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            margin: 0 10px;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--gold);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -5px;
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }

        /* Player Controls */
        .main-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-icon:hover { color: var(--gold); transform: scale(1.1); }
        .btn-icon:active { transform: scale(0.9); }

        .btn-play {
            background: var(--gold);
            color: var(--bg-dark);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(251, 191, 36, 0.4);
            transition: 0.3s;
        }
        .btn-play:hover { background: var(--gold-hover); transform: scale(1.05); }
        .btn-play:active { transform: scale(0.95); }

        /* Secondary Buttons (-10s, +10s) */
        .secondary-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .btn-seek {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-seek:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--gold); color: var(--gold); }

        /* Mini Player Toggle */
        .btn-toggle-mini {
            background: transparent;
            color: var(--text-muted);
            border: none;
            font-size: 13px;
            cursor: pointer;
            margin-top: 25px;
            text-decoration: underline;
            transition: 0.2s;
        }
        .btn-toggle-mini:hover { color: var(--gold); }

        /* FLOATING MINI PLAYER */
        #mini-player {
            display: none;
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 9999;
            text-align: center;
            width: 240px;
            backdrop-filter: blur(10px);
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        #mini-title { font-size: 14px; font-weight: 600; color: var(--gold); margin-bottom: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-controls { display: flex; justify-content: space-around; align-items: center; }
        .mini-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; transition: 0.2s; }
        .mini-btn:hover { color: var(--gold); }
        .mini-play { background: var(--gold); color: var(--bg-dark); width: 40px; height: 40px; border-radius: 50%; font-size: 18px; display: flex; justify-content: center; align-items: center;}
        
        .close-mini { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center; font-size: 12px;}

        /* Audio element hidden */
        audio { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f54b.svg" alt="Kaaba Icon" class="icon-img">
        
        <h1>Quran Majeed</h1>
        <p>Qari Mishary Rashid Alafasy</p>
        
        <select id="surah-list" onchange="changeSurahFromList()"></select>
        
        <div id="saved-msg" class="saved-msg">✓ Wahan se shuru kiya gaya jahan chhora tha</div>

        <audio id="audio-player" preload="metadata"></audio>

        <!-- PREMIUM CUSTOM PLAYER -->
        <div class="progress-container">
            <span id="current-time">00:00</span>
            <input type="range" id="progress-bar" value="0" step="1">
            <span id="total-time">00:00</span>
        </div>

        <div class="main-controls">
            <button class="btn-icon" onclick="prevSurah()">⏮</button>
            <button class="btn-play" id="main-play-btn" onclick="togglePlayPause()">▶</button>
            <button class="btn-icon" onclick="nextSurah()">⏭</button>
        </div>

        <div class="secondary-controls">
            <button class="btn-seek" onclick="seekBackward()">⏪ -10s</button>
            <button class="btn-seek" onclick="seekForward()">+10s ⏩</button>
        </div>

        <button class="btn-toggle-mini" onclick="toggleMiniPlayer()">Mini Player ⇱</button>
    </div>

    <!-- PREMIUM FLOATING MINI PLAYER -->
    <div id="mini-player">
        <button class="close-mini" onclick="toggleMiniPlayer()">✕</button>
        <div id="mini-title">🕋 1. Al-Fatihah</div>
        <div class="mini-controls">
            <button class="mini-btn" onclick="prevSurah()">⏮</button>
            <button class="mini-btn mini-play" id="mini-play-btn" onclick="togglePlayPause()">▶</button>
            <button class="mini-btn" onclick="nextSurah()">⏭</button>
        </div>
    </div>

    <script>
        const surahNames = [
            "Al-Fatihah", "Al-Baqarah", "Aal-e-Imran", "An-Nisa", "Al-Ma'idah", "Al-An'am", "Al-A'raf", "Al-Anfal", "At-Tawbah", "Yunus",
            "Hud", "Yusuf", "Ar-Ra'd", "Ibrahim", "Al-Hijr", "An-Nahl", "Al-Isra", "Al-Kahf", "Maryam", "Ta-Ha",
            "Al-Anbiya", "Al-Hajj", "Al-Mu'minun", "An-Nur", "Al-Furqan", "Ash-Shu'ara", "An-Naml", "Al-Qasas", "Al-Ankabut", "Ar-Rum",
            "Luqman", "As-Sajdah", "Al-Ahzab", "Saba", "Fatir", "Ya-Sin", "As-Saffat", "Sad", "Az-Zumar", "Ghafir",
            "Fussilat", "Ash-Shura", "Az-Zukhruf", "Ad-Dukhan", "Al-Jathiyah", "Al-Ahqaf", "Muhammad", "Al-Fath", "Al-Hujurat", "Qaf",
            "Ad-Dhariyat", "At-Tur", "An-Najm", "Al-Qamar", "Ar-Rahman", "Al-Waqi'ah", "Al-Hadid", "Al-Mujadila", "Al-Hashr", "Al-Mumtahanah",
            "As-Saff", "Al-Jumu'ah", "Al-Munafiqun", "At-Taghabun", "At-Talaq", "At-Tahrim", "Al-Mulk", "Al-Qalam", "Al-Haqqah", "Al-Ma'arij",
            "Nuh", "Al-Jinn", "Al-Muzzammil", "Al-Muddaththir", "Al-Qiyamah", "Al-Insan", "Al-Mursalat", "An-Naba", "An-Nazi'at", "Abasa",
            "At-Takwir", "Al-Infitar", "Al-Mutaffifin", "Al-Inshiqaq", "Al-Buruj", "At-Tariq", "Al-A'la", "Al-Ghashiyah", "Al-Fajr", "Al-Balad",
            "Ash-Shams", "Al-Lail", "Ad-Duha", "Ash-Sharh", "At-Tin", "Al-Alaq", "Al-Qadr", "Al-Bayyinah", "Az-Zalzalah", "Al-Adiyat",
            "Al-Qari'ah", "At-Takathur", "Al-Asr", "Al-Humazah", "Al-Fil", "Quraish", "Al-Ma'un", "Al-Kawthar", "Al-Kafirun", "An-Nasr",
            "Al-Masad", "Al-Ikhlas", "Al-Falaq", "An-Nas"
        ];

        let currentSurahIndex = 0;
        const audioPlayer = document.getElementById("audio-player");
        const surahDropdown = document.getElementById("surah-list");
        const savedMsg = document.getElementById("saved-msg");
        
        // Custom Player UI Elements
        const mainPlayBtn = document.getElementById("main-play-btn");
        const progressBar = document.getElementById("progress-bar");
        const currentTimeEl = document.getElementById("current-time");
        const totalTimeEl = document.getElementById("total-time");
        
        // Mini Player Elements
        const miniPlayer = document.getElementById("mini-player");
        const miniTitle = document.getElementById("mini-title");
        const miniPlayBtn = document.getElementById("mini-play-btn");

        const STORAGE_SURAH = "quran_saved_surah";
        const STORAGE_TIME = "quran_saved_time";

        // Initialize Dropdown
        surahNames.forEach((surah, index) => {
            let option = document.createElement("option");
            option.value = index;
            option.text = `${index + 1}. Surah ${surah}`;
            surahDropdown.appendChild(option);
        });

        // Time Formatting (seconds to mm:ss)
        function formatTime(sec) {
            if (isNaN(sec)) return "00:00";
            let min = Math.floor(sec / 60);
            let rawSec = Math.floor(sec % 60);
            return `${min < 10 ? '0' + min : min}:${rawSec < 10 ? '0' + rawSec : rawSec}`;
        }

        function toggleMiniPlayer() {
            miniPlayer.style.display = (miniPlayer.style.display === "none" || miniPlayer.style.display === "") ? "block" : "none";
        }

        function togglePlayPause() {
            if (audioPlayer.paused) {
                audioPlayer.play().catch(e => console.log("Autoplay prevented by browser."));
            } else {
                audioPlayer.pause();
            }
        }

        // Sync UI with Audio State
        audioPlayer.addEventListener('play', () => { 
            mainPlayBtn.innerHTML = "⏸"; 
            miniPlayBtn.innerHTML = "⏸"; 
        });
        audioPlayer.addEventListener('pause', () => { 
            mainPlayBtn.innerHTML = "▶"; 
            miniPlayBtn.innerHTML = "▶"; 
        });

        // Update Progress Bar
        audioPlayer.addEventListener('timeupdate', () => {
            if (audioPlayer.duration) {
                progressBar.value = audioPlayer.currentTime;
                currentTimeEl.innerText = formatTime(audioPlayer.currentTime);
                // Save time smoothly
                if (audioPlayer.currentTime > 0) {
                    localStorage.setItem(STORAGE_TIME, audioPlayer.currentTime);
                }
            }
        });

        // Set Total Time when Audio Loads
        audioPlayer.addEventListener('loadedmetadata', () => {
            progressBar.max = audioPlayer.duration;
            totalTimeEl.innerText = formatTime(audioPlayer.duration);
        });

        // Seek Audio from Progress Bar Drag
        progressBar.addEventListener('input', () => {
            audioPlayer.currentTime = progressBar.value;
        });

        // Media Session (Lock Screen)
        function updateMediaSession(index) {
            if ('mediaSession' in navigator) {
                let cleanSurahName = `${index + 1}. ${surahNames[index]}`;
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: cleanSurahName,
                    artist: 'Qari Mishary Rashid Alafasy',
                    album: 'Quran Majeed Premium',
                    artwork: [{ src: 'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f54b.svg', sizes: '512x512', type: 'image/svg+xml' }]
                });
                navigator.mediaSession.setActionHandler('play', () => audioPlayer.play());
                navigator.mediaSession.setActionHandler('pause', () => audioPlayer.pause());
                navigator.mediaSession.setActionHandler('previoustrack', prevSurah);
                navigator.mediaSession.setActionHandler('nexttrack', nextSurah);
                navigator.mediaSession.setActionHandler('seekbackward', seekBackward);
                navigator.mediaSession.setActionHandler('seekforward', seekForward);
            }
        }

        function loadSurah(index, isResuming = false) {
            let surahNumber = (index + 1).toString().padStart(3, '0');
            audioPlayer.src = `https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/${surahNumber}.mp3`;
            
            let currentSurahNameShort = `${index + 1}. ${surahNames[index]}`;
            surahDropdown.selectedIndex = index;
            document.title = `🕋 ${currentSurahNameShort}`;
            miniTitle.innerText = `🕋 ${currentSurahNameShort}`;
            
            localStorage.setItem(STORAGE_SURAH, index);
            updateMediaSession(index);

            // Reset UI
            progressBar.value = 0;
            currentTimeEl.innerText = "00:00";
            totalTimeEl.innerText = "00:00";

            if (!isResuming) {
                localStorage.setItem(STORAGE_TIME, 0);
                audioPlayer.play().catch(e => console.log("Waiting for user to click play."));
                savedMsg.style.display = "none";
            }
        }

        function changeSurahFromList() {
            currentSurahIndex = parseInt(surahDropdown.value);
            loadSurah(currentSurahIndex, false);
        }

        function nextSurah() {
            currentSurahIndex = (currentSurahIndex < 113) ? currentSurahIndex + 1 : 0;
            loadSurah(currentSurahIndex, false);
        }

        function prevSurah() {
            if (currentSurahIndex > 0) {
                currentSurahIndex--;
                loadSurah(currentSurahIndex, false);
            }
        }

        // Bug-Free Advanced Seek Logic
        function seekForward() {
            if (isFinite(audioPlayer.duration)) {
                audioPlayer.currentTime = Math.min(audioPlayer.currentTime + 10, audioPlayer.duration);
            }
        }

        function seekBackward() {
            if (isFinite(audioPlayer.duration)) {
                audioPlayer.currentTime = Math.max(audioPlayer.currentTime - 10, 0);
            }
        }

        audioPlayer.addEventListener("ended", nextSurah);

        // Initialization
        window.onload = () => {
            let savedSurah = localStorage.getItem(STORAGE_SURAH);
            let savedTime = localStorage.getItem(STORAGE_TIME);

            if (savedSurah !== null) currentSurahIndex = parseInt(savedSurah);

            loadSurah(currentSurahIndex, true);

            audioPlayer.addEventListener("loadedmetadata", function setTimeOnce() {
                if (savedTime !== null && parseFloat(savedTime) > 0) {
                    audioPlayer.currentTime = parseFloat(savedTime);
                    savedMsg.style.display = "block";
                }
                audioPlayer.removeEventListener("loadedmetadata", setTimeOnce);
            });
        };
    </script>
</body>
</html>
