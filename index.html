<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕋 Quran Majeed</title>
    
    <link rel="icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f54b.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f54b.svg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style id="main-styles">
        :root {
            --bg-dark: #0f172a;
            --bg-light: #1e293b;
            --gold: #fbbf24;
            --gold-hover: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(255, 255, 255, 0.05);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark), #1e3a8a);
            color: var(--text-main);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            max-width: 400px;
            width: 100%;
            position: relative;
        }

        .icon-img { width: 85px; margin-bottom: 15px; filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.5)); transition: var(--transition); }
        .icon-img:hover { transform: scale(1.05); }

        h1 { font-size: 24px; margin: 0 0 4px 0; font-weight: 700; color: var(--gold); letter-spacing: 0.5px; }
        p { font-size: 13px; color: var(--text-muted); margin: 0 0 25px 0; font-weight: 500;}

        /* Premium Select Dropdown Fix */
        .select-wrapper { position: relative; margin-bottom: 25px; }
        .select-wrapper::after {
            content: '▼'; font-size: 10px; color: var(--gold);
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%); pointer-events: none;
        }
        select {
            width: 100%; padding: 14px 20px; font-size: 14px;
            background-color: rgba(30, 41, 59, 0.8); color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 14px;
            cursor: pointer; font-weight: 600; outline: none; text-align: left;
            appearance: none; -webkit-appearance: none; transition: var(--transition);
        }
        select:focus, select:hover { border-color: rgba(251, 191, 36, 0.5); background-color: var(--bg-light); }

        .saved-msg-container { height: 20px; margin-bottom: 15px; }
        .saved-msg { font-size: 12px; color: #10b981; font-weight: 600; display: none; opacity: 0; transition: opacity 0.3s; }

        /* Spotify-style Slider */
        .progress-container { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; font-size: 12px; color: var(--text-muted); font-weight: 600; font-variant-numeric: tabular-nums; }
        input[type=range] { -webkit-appearance: none; width: 100%; margin: 0 12px; background: transparent; height: 16px; display: flex; align-items: center; }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.15); border-radius: 2px; cursor: pointer; transition: var(--transition); }
        input[type=range]:hover::-webkit-slider-runnable-track { background: rgba(255, 255, 255, 0.25); }
        input[type=range]::-webkit-slider-thumb { height: 12px; width: 12px; border-radius: 50%; background: var(--text-main); cursor: pointer; -webkit-appearance: none; margin-top: -4px; transition: var(--transition); box-shadow: 0 0 5px rgba(0,0,0,0.3); }
        input[type=range]:hover::-webkit-slider-thumb { background: var(--gold); transform: scale(1.3); box-shadow: 0 0 10px rgba(251, 191, 36, 0.4); }

        /* Controls Grid */
        .main-controls { display: flex; align-items: center; justify-content: center; gap: 25px; margin-bottom: 20px; }
        .btn-icon { background: none; border: none; color: var(--text-main); font-size: 22px; cursor: pointer; transition: var(--transition); padding: 10px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .btn-icon:hover { color: var(--gold); background: rgba(255, 255, 255, 0.05); }
        .btn-icon:active { transform: scale(0.85); }
        
        .btn-play { background: var(--gold); color: var(--bg-dark); width: 64px; height: 64px; border-radius: 50%; border: none; font-size: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition); box-shadow: 0 8px 20px rgba(251, 191, 36, 0.3); }
        .btn-play:hover { background: var(--gold-hover); transform: scale(1.05); box-shadow: 0 10px 25px rgba(251, 191, 36, 0.4); }
        .btn-play:active { transform: scale(0.95); }

        .secondary-controls { display: flex; justify-content: center; gap: 12px; }
        .btn-seek { background: transparent; border: 1px solid rgba(255, 255, 255, 0.15); color: var(--text-muted); padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 5px; }
        .btn-seek:hover { border-color: var(--gold); color: var(--gold); background: rgba(251, 191, 36, 0.05); }
        .btn-seek:active { transform: scale(0.95); }

        .btn-toggle-mini { background: rgba(0,0,0,0.2); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 25px; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        .btn-toggle-mini:hover { color: var(--text-main); background: rgba(0,0,0,0.4); }

        /* Loader Animation */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .loading { animation: spin 1s linear infinite; font-size: 24px; }

        /* Normal Mini Player */
        #mini-player {
            display: none; position: fixed; bottom: 20px; right: 20px;
            background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 15px 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            z-index: 9999; width: 280px; backdrop-filter: blur(15px);
            opacity: 0; transform: translateY(20px); transition: opacity 0.3s, transform 0.3s;
        }
        #mini-player.show { display: block; opacity: 1; transform: translateY(0); }
        #mini-title { font-size: 13px; font-weight: 600; color: var(--gold); margin-bottom: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center;}
        .mini-controls { display: flex; justify-content: space-between; align-items: center; padding: 0 10px;}
        .mini-btn { background: none; border: none; color: var(--text-main); font-size: 18px; cursor: pointer; transition: var(--transition); padding: 5px;}
        .mini-btn:hover { color: var(--gold); }
        .mini-play { background: var(--gold); color: var(--bg-dark); width: 42px; height: 42px; border-radius: 50%; font-size: 18px; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(251, 191, 36, 0.2);}
        .close-mini { position: absolute; top: -8px; right: -8px; background: #334155; color: var(--text-main); border: 2px solid #0f172a; border-radius: 50%; width: 26px; height: 26px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 10px; transition: var(--transition);}
        .close-mini:hover { background: #ef4444; }

        /* PiP Mode CSS overrides */
        body.pip-mode { margin: 0; padding: 0; background: var(--bg-dark); height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center;}
        body.pip-mode #mini-player { position: static; width: 100%; height: 100%; border: none; border-radius: 0; box-shadow: none; display: flex; flex-direction: column; justify-content: center; padding: 25px; opacity: 1; transform: none;}
        body.pip-mode .close-mini { display: none; }
        body.pip-mode #mini-title { font-size: 16px; margin-bottom: 25px; }
        body.pip-mode .mini-play { width: 56px; height: 56px; font-size: 24px; }
        body.pip-mode .mini-btn { font-size: 24px; }

        audio { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f54b.svg" alt="Kaaba Icon" class="icon-img">
        <h1>Quran Majeed</h1>
        <p>Qari Mishary Rashid Alafasy</p>
        
        <div class="select-wrapper">
            <select id="surah-list" onchange="changeSurahFromList()"></select>
        </div>
        
        <div class="saved-msg-container">
            <div id="saved-msg" class="saved-msg">✓ Wahan se shuru kiya gaya jahan chhora tha</div>
        </div>

        <audio id="audio-player" preload="metadata"></audio>

        <div class="progress-container">
            <span id="current-time">00:00</span>
            <input type="range" id="progress-bar" value="0" step="1">
            <span id="total-time">00:00</span>
        </div>

        <div class="main-controls">
            <button class="btn-icon" onclick="prevSurah()" title="Previous">⏮</button>
            <button class="btn-play" id="main-play-btn" onclick="togglePlayPause()">▶</button>
            <button class="btn-icon" onclick="nextSurah()" title="Next">⏭</button>
        </div>

        <div class="secondary-controls">
            <button class="btn-seek" onclick="seekBackward()">⏪ 10s</button>
            <button class="btn-seek" onclick="seekForward()">10s ⏩</button>
        </div>

        <button class="btn-toggle-mini" onclick="toggleFloatingPlayer()">⇱ Pop-out Mini Player</button>
    </div>

    <!-- MINI PLAYER -->
    <div id="mini-player">
        <button class="close-mini" onclick="closeMiniPlayer()">✕</button>
        <div id="mini-title">🕋 1. Al-Fatihah</div>
        <div class="mini-controls">
            <button class="mini-btn" onclick="prevSurah()">⏮</button>
            <button class="mini-btn mini-play" id="mini-play-btn" onclick="togglePlayPause()">▶</button>
            <button class="mini-btn" onclick="nextSurah()">⏭</button>
        </div>
    </div>

    <script>
        const surahNames = [
            "Al-Fatihah", "Al-Baqarah", "Aal-e-Imran", "An-Nisa", "Al-Ma'idah", "Al-An'am", "Al-A'raf", "Al-Anfal", "At-Tawbah", "Yunus",
            "Hud", "Yusuf", "Ar-Ra'd", "Ibrahim", "Al-Hijr", "An-Nahl", "Al-Isra", "Al-Kahf", "Maryam", "Ta-Ha",
            "Al-Anbiya", "Al-Hajj", "Al-Mu'minun", "An-Nur", "Al-Furqan", "Ash-Shu'ara", "An-Naml", "Al-Qasas", "Al-Ankabut", "Ar-Rum",
            "Luqman", "As-Sajdah", "Al-Ahzab", "Saba", "Fatir", "Ya-Sin", "As-Saffat", "Sad", "Az-Zumar", "Ghafir",
            "Fussilat", "Ash-Shura", "Az-Zukhruf", "Ad-Dukhan", "Al-Jathiyah", "Al-Ahqaf", "Muhammad", "Al-Fath", "Al-Hujurat", "Qaf",
            "Ad-Dhariyat", "At-Tur", "An-Najm", "Al-Qamar", "Ar-Rahman", "Al-Waqi'ah", "Al-Hadid", "Al-Mujadila", "Al-Hashr", "Al-Mumtahanah",
            "As-Saff", "Al-Jumu'ah", "Al-Munafiqun", "At-Taghabun", "At-Talaq", "At-Tahrim", "Al-Mulk", "Al-Qalam", "Al-Haqqah", "Al-Ma'arij",
            "Nuh", "Al-Jinn", "Al-Muzzammil", "Al-Muddaththir", "Al-Qiyamah", "Al-Insan", "Al-Mursalat", "An-Naba", "An-Nazi'at", "Abasa",
            "At-Takwir", "Al-Infitar", "Al-Mutaffifin", "Al-Inshiqaq", "Al-Buruj", "At-Tariq", "Al-A'la", "Al-Ghashiyah", "Al-Fajr", "Al-Balad",
            "Ash-Shams", "Al-Lail", "Ad-Duha", "Ash-Sharh", "At-Tin", "Al-Alaq", "Al-Qadr", "Al-Bayyinah", "Az-Zalzalah", "Al-Adiyat",
            "Al-Qari'ah", "At-Takathur", "Al-Asr", "Al-Humazah", "Al-Fil", "Quraish", "Al-Ma'un", "Al-Kawthar", "Al-Kafirun", "An-Nasr",
            "Al-Masad", "Al-Ikhlas", "Al-Falaq", "An-Nas"
        ];

        let currentSurahIndex = 0;
        let isDragging = false; 

        const audioPlayer = document.getElementById("audio-player");
        const surahDropdown = document.getElementById("surah-list");
        const mainPlayBtn = document.getElementById("main-play-btn");
        const progressBar = document.getElementById("progress-bar");
        const currentTimeEl = document.getElementById("current-time");
        const totalTimeEl = document.getElementById("total-time");
        const miniPlayer = document.getElementById("mini-player");
        const miniTitle = document.getElementById("mini-title");
        const miniPlayBtn = document.getElementById("mini-play-btn");
        const savedMsg = document.getElementById("saved-msg");

        let pipWindow = null; 

        surahNames.forEach((surah, index) => {
            let option = document.createElement("option");
            option.value = index; option.text = `${index + 1}. ${surah}`;
            surahDropdown.appendChild(option);
        });

        function formatTime(sec) {
            if (isNaN(sec) || !isFinite(sec)) return "00:00";
            let min = Math.floor(sec / 60); let rawSec = Math.floor(sec % 60);
            return `${min < 10 ? '0' + min : min}:${rawSec < 10 ? '0' + rawSec : rawSec}`;
        }

        // Show Loading State Bug Fix
        function showLoading() {
            mainPlayBtn.innerHTML = "⏳";
            mainPlayBtn.classList.add("loading");
            miniPlayBtn.innerHTML = "⏳";
        }
        function hideLoading() {
            mainPlayBtn.classList.remove("loading");
            if(audioPlayer.paused) { mainPlayBtn.innerHTML = "▶"; miniPlayBtn.innerHTML = "▶"; }
            else { mainPlayBtn.innerHTML = "⏸"; miniPlayBtn.innerHTML = "⏸"; }
        }

        audioPlayer.addEventListener('waiting', showLoading);
        audioPlayer.addEventListener('playing', hideLoading);
        audioPlayer.addEventListener('canplay', hideLoading);

        async function toggleFloatingPlayer() {
            if ('documentPictureInPicture' in window) {
                if (pipWindow) { pipWindow.close(); return; }
                try {
                    pipWindow = await window.documentPictureInPicture.requestWindow({ width: 340, height: 160 });
                    const style = document.createElement('style');
                    style.textContent = document.getElementById('main-styles').textContent;
                    pipWindow.document.head.appendChild(style);

                    pipWindow.document.body.classList.add('pip-mode');
                    miniPlayer.style.display = 'flex';
                    pipWindow.document.body.appendChild(miniPlayer);

                    pipWindow.addEventListener("pagehide", () => {
                        document.body.appendChild(miniPlayer);
                        miniPlayer.classList.remove('show');
                        setTimeout(() => { if(!pipWindow) miniPlayer.style.display = 'none'; }, 300);
                        pipWindow = null;
                    });
                } catch (error) { normalMiniPlayer(); }
            } else { normalMiniPlayer(); }
        }

        function normalMiniPlayer() {
            if (miniPlayer.classList.contains('show')) {
                miniPlayer.classList.remove('show');
                setTimeout(() => { miniPlayer.style.display = 'none'; }, 300);
            } else {
                miniPlayer.style.display = 'block';
                setTimeout(() => { miniPlayer.classList.add('show'); }, 10);
            }
        }

        function closeMiniPlayer() {
            if (pipWindow) { pipWindow.close(); } 
            else { normalMiniPlayer(); }
        }

        function togglePlayPause() {
            if (audioPlayer.paused) audioPlayer.play(); else audioPlayer.pause();
        }

        audioPlayer.addEventListener('play', () => { mainPlayBtn.innerHTML = "⏸"; miniPlayBtn.innerHTML = "⏸"; });
        audioPlayer.addEventListener('pause', () => { mainPlayBtn.innerHTML = "▶"; miniPlayBtn.innerHTML = "▶"; });

        audioPlayer.addEventListener('timeupdate', () => {
            if (audioPlayer.duration && !isDragging) {
                progressBar.value = audioPlayer.currentTime;
                currentTimeEl.innerText = formatTime(audioPlayer.currentTime);
                if (audioPlayer.currentTime > 0) localStorage.setItem("quran_saved_time", audioPlayer.currentTime);
            }
        });

        audioPlayer.addEventListener('loadedmetadata', () => {
            progressBar.max = audioPlayer.duration;
            totalTimeEl.innerText = formatTime(audioPlayer.duration);
        });

        progressBar.addEventListener('mousedown', () => isDragging = true);
        progressBar.addEventListener('touchstart', () => isDragging = true);
        progressBar.addEventListener('input', () => currentTimeEl.innerText = formatTime(progressBar.value));
        
        const endDrag = () => { if(isDragging){ isDragging = false; audioPlayer.currentTime = progressBar.value; } };
        progressBar.addEventListener('mouseup', endDrag);
        progressBar.addEventListener('touchend', endDrag);

        function updateMediaSession(index) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: `${index + 1}. ${surahNames[index]}`,
                    artist: 'Qari Mishary Rashid Alafasy',
                    artwork: [{ src: 'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f54b.png', sizes: '72x72', type: 'image/png' }]
                });
                navigator.mediaSession.setActionHandler('play', () => audioPlayer.play());
                navigator.mediaSession.setActionHandler('pause', () => audioPlayer.pause());
                navigator.mediaSession.setActionHandler('previoustrack', prevSurah);
                navigator.mediaSession.setActionHandler('nexttrack', nextSurah);
                navigator.mediaSession.setActionHandler('seekbackward', seekBackward);
                navigator.mediaSession.setActionHandler('seekforward', seekForward);
            }
        }

        function showSavedMessage() {
            savedMsg.style.display = "block";
            setTimeout(() => { savedMsg.style.opacity = "1"; }, 10);
            setTimeout(() => { 
                savedMsg.style.opacity = "0"; 
                setTimeout(() => { savedMsg.style.display = "none"; }, 300);
            }, 4000);
        }

        function loadSurah(index, isResuming = false) {
            showLoading(); // UI Bug Fix 2
            let surahNumber = (index + 1).toString().padStart(3, '0');
            audioPlayer.src = `https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/${surahNumber}.mp3`;
            
            surahDropdown.selectedIndex = index;
            document.title = `🕋 ${index + 1}. ${surahNames[index]}`;
            miniTitle.innerText = `🕋 ${index + 1}. ${surahNames[index]}`;
            
            localStorage.setItem("quran_saved_surah", index);
            updateMediaSession(index);

            progressBar.value = 0;
            currentTimeEl.innerText = "00:00";
            if(!isResuming) totalTimeEl.innerText = "00:00";

            if (!isResuming) {
                localStorage.setItem("quran_saved_time", 0);
                audioPlayer.play().catch(e => hideLoading());
            }
        }

        function prevSurah() { if (currentSurahIndex > 0) { currentSurahIndex--; loadSurah(currentSurahIndex); } }
        function nextSurah() { currentSurahIndex = (currentSurahIndex < 113) ? currentSurahIndex + 1 : 0; loadSurah(currentSurahIndex); }
        function seekForward() { if (isFinite(audioPlayer.duration)) audioPlayer.currentTime = Math.min(audioPlayer.currentTime + 10, audioPlayer.duration); }
        function seekBackward() { if (isFinite(audioPlayer.duration)) audioPlayer.currentTime = Math.max(audioPlayer.currentTime - 10, 0); }
        
        audioPlayer.addEventListener("ended", nextSurah);
        function changeSurahFromList() { currentSurahIndex = parseInt(surahDropdown.value); loadSurah(currentSurahIndex); }

        window.onload = () => {
            let savedSurah = localStorage.getItem("quran_saved_surah");
            let savedTime = localStorage.getItem("quran_saved_time");
            if (savedSurah !== null) currentSurahIndex = parseInt(savedSurah);
            loadSurah(currentSurahIndex, true);
            
            audioPlayer.addEventListener("loadedmetadata", function setTimeOnce() {
                if (savedTime !== null && parseFloat(savedTime) > 0) {
                    audioPlayer.currentTime = parseFloat(savedTime);
                    showSavedMessage();
                }
                audioPlayer.removeEventListener("loadedmetadata", setTimeOnce);
            });
        };
    </script>
</body>
</html>
