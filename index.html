<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Default Tab Title -->
    <title>🕋 Quran Majeed</title>
    
    <!-- PAKKA AUR SECURE KHANA KAABA ICON -->
    <link rel="icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f54b.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f54b.svg">

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1e3c72;
            color: white;
            text-align: center;
            padding: 30px 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        .icon-img {
            width: 80px;
            margin-bottom: 10px;
            filter: drop-shadow(0px 4px 5px rgba(0,0,0,0.3));
        }
        h1 { font-size: 24px; margin-bottom: 5px; }
        p { font-size: 14px; color: #e0e0e0; margin-bottom: 20px;}
        h2 { font-size: 20px; color: #ffd700; margin-bottom: 15px; }
        
        select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            background-color: #ffffff;
            color: #1e3c72;
            border: 2px solid #ffd700;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .saved-msg {
            font-size: 13px;
            color: #4CAF50;
            margin-bottom: 15px;
            display: none;
        }

        .controls button {
            background-color: #ffd700;
            color: #1e3c72;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .controls button:hover { background-color: #ffc107; transform: scale(1.05); }
        audio { width: 100%; margin-top: 10px; margin-bottom: 20px; outline: none; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Center mein Khana Kaaba ka naya Secure icon -->
        <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f54b.svg" alt="Kaaba Icon" class="icon-img">
        
        <h1>Quran Majeed</h1>
        <p>Tilawat: Qari Mishary Rashid Alafasy</p>
        
        <select id="surah-list" onchange="changeSurahFromList()"></select>
        
        <div id="saved-msg" class="saved-msg">✓ Wahan se shuru kiya gaya jahan aapne chhora tha</div>

        <h2 id="surah-title">1. Surah Al-Fatihah</h2>
        
        <audio id="audio-player" controls preload="metadata">
            Aapka browser audio support nahi karta.
        </audio>

        <div class="controls">
            <!-- Yahan buttons ka text change kar diya gaya hai -->
            <button onclick="prevSurah()">⏮ Previous</button>
            <button onclick="nextSurah()">Next ⏭</button>
        </div>
    </div>

    <script>
        const surahNames = [
            "Al-Fatihah", "Al-Baqarah", "Aal-e-Imran", "An-Nisa", "Al-Ma'idah", "Al-An'am", "Al-A'raf", "Al-Anfal", "At-Tawbah", "Yunus",
            "Hud", "Yusuf", "Ar-Ra'd", "Ibrahim", "Al-Hijr", "An-Nahl", "Al-Isra", "Al-Kahf", "Maryam", "Ta-Ha",
            "Al-Anbiya", "Al-Hajj", "Al-Mu'minun", "An-Nur", "Al-Furqan", "Ash-Shu'ara", "An-Naml", "Al-Qasas", "Al-Ankabut", "Ar-Rum",
            "Luqman", "As-Sajdah", "Al-Ahzab", "Saba", "Fatir", "Ya-Sin", "As-Saffat", "Sad", "Az-Zumar", "Ghafir",
            "Fussilat", "Ash-Shura", "Az-Zukhruf", "Ad-Dukhan", "Al-Jathiyah", "Al-Ahqaf", "Muhammad", "Al-Fath", "Al-Hujurat", "Qaf",
            "Ad-Dhariyat", "At-Tur", "An-Najm", "Al-Qamar", "Ar-Rahman", "Al-Waqi'ah", "Al-Hadid", "Al-Mujadila", "Al-Hashr", "Al-Mumtahanah",
            "As-Saff", "Al-Jumu'ah", "Al-Munafiqun", "At-Taghabun", "At-Talaq", "At-Tahrim", "Al-Mulk", "Al-Qalam", "Al-Haqqah", "Al-Ma'arij",
            "Nuh", "Al-Jinn", "Al-Muzzammil", "Al-Muddaththir", "Al-Qiyamah", "Al-Insan", "Al-Mursalat", "An-Naba", "An-Nazi'at", "Abasa",
            "At-Takwir", "Al-Infitar", "Al-Mutaffifin", "Al-Inshiqaq", "Al-Buruj", "At-Tariq", "Al-A'la", "Al-Ghashiyah", "Al-Fajr", "Al-Balad",
            "Ash-Shams", "Al-Lail", "Ad-Duha", "Ash-Sharh", "At-Tin", "Al-Alaq", "Al-Qadr", "Al-Bayyinah", "Az-Zalzalah", "Al-Adiyat",
            "Al-Qari'ah", "At-Takathur", "Al-Asr", "Al-Humazah", "Al-Fil", "Quraish", "Al-Ma'un", "Al-Kawthar", "Al-Kafirun", "An-Nasr",
            "Al-Masad", "Al-Ikhlas", "Al-Falaq", "An-Nas"
        ];

        let currentSurahIndex = 0;
        const audioPlayer = document.getElementById("audio-player");
        const surahTitle = document.getElementById("surah-title");
        const surahDropdown = document.getElementById("surah-list");
        const savedMsg = document.getElementById("saved-msg");

        const STORAGE_SURAH = "quran_saved_surah";
        const STORAGE_TIME = "quran_saved_time";

        // Dropdown menu ko bharna
        surahNames.forEach((surah, index) => {
            let option = document.createElement("option");
            option.value = index;
            option.text = `${index + 1}. Surah ${surah}`;
            surahDropdown.appendChild(option);
        });

        // Lock Screen aur Background Controls
        function updateMediaSession(index) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: `${index + 1}. Surah ${surahNames[index]}`,
                    artist: 'Qari Mishary Rashid Alafasy',
                    album: 'Quran Majeed - Auto Play',
                    artwork: [
                        { src: 'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f54b.svg', sizes: '512x512', type: 'image/svg+xml' }
                    ]
                });

                navigator.mediaSession.setActionHandler('play', function() { audioPlayer.play(); });
                navigator.mediaSession.setActionHandler('pause', function() { audioPlayer.pause(); });
                navigator.mediaSession.setActionHandler('previoustrack', function() { prevSurah(); });
                navigator.mediaSession.setActionHandler('nexttrack', function() { nextSurah(); });
            }
        }

        // Surah load karna
        function loadSurah(index, isResuming = false) {
            let surahNumber = (index + 1).toString().padStart(3, '0');
            
            // Fast Quran.com Server Link
            let audioUrl = `https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/${surahNumber}.mp3`;
            
            audioPlayer.src = audioUrl;
            
            let currentSurahName = `${index + 1}. Surah ${surahNames[index]}`;
            
            surahTitle.innerText = currentSurahName;
            surahDropdown.selectedIndex = index;
            
            // Tab mein Khana Kaaba ka emoji aur Surah ka naam aayega
            document.title = ` ${currentSurahName}`;
            
            localStorage.setItem(STORAGE_SURAH, index);
            updateMediaSession(index);

            if (!isResuming) {
                localStorage.setItem(STORAGE_TIME, 0);
                audioPlayer.play();
                savedMsg.style.display = "none";
            }
        }

        function changeSurahFromList() {
            currentSurahIndex = parseInt(surahDropdown.value);
            loadSurah(currentSurahIndex, false);
        }

        function nextSurah() {
            if (currentSurahIndex < 113) {
                currentSurahIndex++;
                loadSurah(currentSurahIndex, false);
            } else {
                currentSurahIndex = 0;
                loadSurah(currentSurahIndex, false);
            }
        }

        function prevSurah() {
            if (currentSurahIndex > 0) {
                currentSurahIndex--;
                loadSurah(currentSurahIndex, false);
            }
        }

        audioPlayer.addEventListener("timeupdate", () => {
            if (audioPlayer.currentTime > 0) {
                localStorage.setItem(STORAGE_TIME, audioPlayer.currentTime);
            }
        });

        audioPlayer.addEventListener("ended", nextSurah);

        window.onload = () => {
            let savedSurah = localStorage.getItem(STORAGE_SURAH);
            let savedTime = localStorage.getItem(STORAGE_TIME);

            if (savedSurah !== null) {
                currentSurahIndex = parseInt(savedSurah);
            }

            loadSurah(currentSurahIndex, true);

            audioPlayer.addEventListener("loadedmetadata", function setTimeOnce() {
                if (savedTime !== null && parseFloat(savedTime) > 0) {
                    audioPlayer.currentTime = parseFloat(savedTime);
                    savedMsg.style.display = "block";
                }
                audioPlayer.removeEventListener("loadedmetadata", setTimeOnce);
            });
        };
    </script>
</body>
</html>
